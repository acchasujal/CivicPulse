services:
  - type: web
    name: civicpulse-backend
    env: python
    region: singapore
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: civicpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: civicpulse-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://civicpulse.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

databases:
  - name: civicpulse-db
    databaseName: civicpulse
    user: civicpulse_user
    plan: free

  - type: redis
    name: civicpulse-redis
    plan: free
    ipAllowList: []
